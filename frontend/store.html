<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store | Gadget Trade Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Gadget Trade Hub</a>
        <nav class="nav-links">
            <a href="sell.html">Sell Phone</a>
            <a href="store.html" class="active" style="color: var(--text-main);">Buy Refurbished</a>
        </nav>
        <div class="auth-buttons">
            <a href="dashboard.html" class="btn btn-outline">My Account</a>
        </div>
    </header>

    <div class="store-container">
        <aside class="filters">
            <h3>Filters</h3>
            <hr>
            <p>
                <label><input type="checkbox"> Apple</label><br>
                <label><input type="checkbox"> Samsung</label><br>
                <label><input type="checkbox"> Google</label>
            </p>
            <hr>
            <p>
                <strong>Condition</strong><br>
                <label><input type="checkbox"> Like New</label><br>
                <label><input type="checkbox"> Good</label>
            </p>
        </aside>
        <main class="product-grid" id="dynamic-product-grid">
            <!-- Dynamic products will be injected here -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
